version:  2.1
jobs:
  build:
    docker:
      - image: cimg/node:lts-browsers
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name:        Test install
          command:     'npm install'
      - run:
          name:        run all tests
          command:     'npm test'
      - store_artifacts:
          path:        coverage
      - run:
          name:        Production install + start smoke test (Heroku parity)
          command:     |
            rm -rf node_modules build
            npm install --omit=dev
            node scripts/smoke-start.mjs
